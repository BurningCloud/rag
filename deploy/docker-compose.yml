version: '3.8'

services:
  # =================== 导入服务 ===================
  import_service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.import
    container_name: rag-import-service
    ports:
      - "8000:8000"
    env_file:
      - .env.docker
    environment:
      - PROJECT_ROOT=/app
      - BGE_M3_PATH=/app/models/BAAI/bge-m3
      - BGE_RERANKER_LARGE=/app/models/BAAI/bge-reranker-large
    volumes:
      - ../models:/app/models:ro
      - import_output:/app/output
      - app_logs:/app/logs
    restart: unless-stopped

  # =================== 查询服务 ===================
  query_service:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.query
    container_name: rag-query-service
    ports:
      - "8001:8001"
    env_file:
      - .env.docker
    environment:
      - PROJECT_ROOT=/app
      - BGE_M3_PATH=/app/models/BAAI/bge-m3
      - BGE_RERANKER_LARGE=/app/models/BAAI/bge-reranker-large
    volumes:
      - ../models:/app/models:ro
      - app_logs:/app/logs
    restart: unless-stopped

  # =================== Nginx 前端代理 ===================
  nginx:
    image: nginx:1.25-alpine
    container_name: rag-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - import_service
      - query_service
    restart: unless-stopped

volumes:
  import_output:
  app_logs:
