version: '3.8'

services:
  rag-app:
    image: rag-server:1.0
    container_name: rag-app
    build:
      context: .
      dockerfile: Dockerfile.example2
    command: ["python", "-m", "app.main"]
    ports:
      - "8080:8000"
    volumes:
      - /rag/models:/app/models:ro
      - /rag/output:/app/output
      - /rag/logs:/app/logs
    env_file:
      - .env
    restart: unless-stopped

  nginx:
    container_name: rag-nginx
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - /ai-finance/frontend/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /ai-finance/frontend/html:/usr/share/nginx/html
    depends_on:
      - rag-app
    restart: unless-stopped
